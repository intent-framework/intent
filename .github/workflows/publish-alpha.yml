name: Publish Alpha

on:
  workflow_dispatch:

concurrency: ${{ github.workflow }}

permissions:
  contents: write

jobs:
  publish-alpha:
    name: Publish Alpha
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate npm token
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is required for publishing."
            exit 1
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Pack Check
        run: pnpm pack:check

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$HOME/.npmrc"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish Alpha
        run: pnpm release:alpha
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Set alpha dist-tags
        run: |
          for dir in packages/core packages/dom packages/router packages/testing; do
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            npm dist-tag add "$name@$version" alpha
            echo "Set $name alpha → $version"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push git tags
        run: git push --tags

      - name: Verify alpha dist-tags
        run: |
          for dir in packages/core packages/dom packages/router packages/testing; do
            name=$(node -p "require('./$dir/package.json').name")
            expected=$(node -p "require('./$dir/package.json').version")
            actual=$(npm view "$name" dist-tags.alpha)
            if [ "$actual" != "$expected" ]; then
              echo "::error::alpha dist-tag for $name is $actual, expected $expected"
              exit 1
            fi
            echo "✅ $name alpha dist-tag: $actual"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify git tags on remote
        run: |
          for dir in packages/core packages/dom packages/router packages/testing; do
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            tag="$name@$version"
            if ! git ls-remote --exit-code --tags origin "refs/tags/$tag" 2>&1; then
              echo "::error::git tag $tag not found on remote"
              exit 1
            fi
            echo "✅ git tag $tag found on remote"
          done
