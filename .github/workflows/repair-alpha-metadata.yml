name: Repair Alpha Metadata

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair-alpha-metadata:
    name: Repair Alpha Metadata
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate npm token
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is required."
            exit 1
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$HOME/.npmrc"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Set alpha dist-tags
        run: |
          npm dist-tag add @intent-framework/core@0.1.0-alpha.2 alpha
          npm dist-tag add @intent-framework/dom@0.1.0-alpha.3 alpha
          npm dist-tag add @intent-framework/router@0.1.0-alpha.2 alpha
          npm dist-tag add @intent-framework/testing@0.1.0-alpha.2 alpha
          echo "✅ alpha dist-tags set"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create missing git tags
        run: |
          PUBLISH_SHA=021197c9efdcebe07ca313c8421ccf370e2fe983
          for tag in \
            @intent-framework/core@0.1.0-alpha.2 \
            @intent-framework/dom@0.1.0-alpha.3 \
            @intent-framework/router@0.1.0-alpha.2 \
            @intent-framework/testing@0.1.0-alpha.2
          do
            if git tag -l "$tag" | grep -q .; then
              echo "Tag $tag already exists locally, skipping creation"
            else
              git tag "$tag" "$PUBLISH_SHA"
              echo "Created tag $tag at $PUBLISH_SHA"
            fi
          done

      - name: Push package tags
        run: |
          for tag in \
            @intent-framework/core@0.1.0-alpha.2 \
            @intent-framework/dom@0.1.0-alpha.3 \
            @intent-framework/router@0.1.0-alpha.2 \
            @intent-framework/testing@0.1.0-alpha.2
          do
            echo "Pushing $tag..."
            git push origin "refs/tags/$tag"
          done
          echo "✅ package tags pushed"

      - name: Verify alpha dist-tags
        run: |
          for spec in \
            "@intent-framework/core 0.1.0-alpha.2" \
            "@intent-framework/dom 0.1.0-alpha.3" \
            "@intent-framework/router 0.1.0-alpha.2" \
            "@intent-framework/testing 0.1.0-alpha.2"
          do
            name=$(echo "$spec" | cut -d' ' -f1)
            expected=$(echo "$spec" | cut -d' ' -f2)
            actual=$(npm view "$name" dist-tags.alpha)
            if [ "$actual" != "$expected" ]; then
              echo "::error::alpha dist-tag for $name is $actual, expected $expected"
              exit 1
            fi
            echo "✅ $name alpha dist-tag: $actual"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify remote git tags
        run: |
          for tag in \
            @intent-framework/core@0.1.0-alpha.2 \
            @intent-framework/dom@0.1.0-alpha.3 \
            @intent-framework/router@0.1.0-alpha.2 \
            @intent-framework/testing@0.1.0-alpha.2
          do
            if ! git ls-remote --exit-code --tags origin "refs/tags/$tag" 2>&1; then
              echo "::error::git tag $tag not found on remote"
              exit 1
            fi
            echo "✅ git tag $tag found on remote"
          done
